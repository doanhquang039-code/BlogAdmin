<!DOCTYPE html>
<html>
<head>
    <title>Test Gemini API Key</title>
</head>
<body style="background: #000; color: #fff; font-family: Arial; padding: 20px;">
    <h1>🔑 Test Gemini API Key</h1>
    
    <div style="margin: 20px 0;">
        <input type="text" id="testInput" placeholder="Nhập tin nhắn test..." 
               style="width: 300px; padding: 10px; font-size: 16px;">
        <button onclick="testAPI()" style="padding: 10px 20px; font-size: 16px;">Test API</button>
    </div>
    
    <div id="result" style="background: #222; padding: 20px; border-radius: 10px; margin-top: 20px;"></div>

    <script>
        const API_KEY = 'AIzaSyAQ-Ab8RN6ILGNs-qbYZZgDBc4IkkTb5ZV5YL6sUy-ahyltWyp13eg';
        const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent';

        async function testAPI() {
            const input = document.getElementById('testInput').value || 'Hello, test message';
            const result = document.getElementById('result');
            
            result.innerHTML = '⏳ Testing API...';
            
            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: input }]
                        }]
                    })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok) {
                    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                        const reply = data.candidates[0].content.parts[0].text;
                        result.innerHTML = `
                            <h3>✅ SUCCESS!</h3>
                            <p><strong>Question:</strong> ${input}</p>
                            <p><strong>Answer:</strong> ${reply}</p>
                        `;
                    } else {
                        result.innerHTML = `
                            <h3>⚠️ UNEXPECTED RESPONSE</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        `;
                    }
                } else {
                    result.innerHTML = `
                        <h3>❌ API ERROR</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Error:</strong> ${data.error ? data.error.message : 'Unknown error'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
                
            } catch (error) {
                console.error('Fetch error:', error);
                result.innerHTML = `
                    <h3>❌ NETWORK ERROR</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p><strong>Details:</strong> ${error.toString()}</p>
                `;
            }
        }

        // Auto test on load
        setTimeout(() => {
            testAPI();
        }, 1000);
    </script>
</body>
</html>
